$font = Fira Code

general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    bezier = melt, 0.25, 1, 0.5, 1
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 3, melt
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
}

# TERMINAL HEADER
label {
    monitor =
    text = cmd[update:86400000] printf '╔══[ SYS://LOCK ]\n║  authentication required\n╚══[ %s ]' "$USER"
    font_size = 14
    font_family = $font
    color = rgba(00fff7cc)
    position = 0, 90
    halign = center
    valign = center
}

# INPUT PROMPT PREFIX — always visible, positioned left of input field
label {
    monitor =
    text = ↪
    font_size = 16
    font_family = $font
    color = rgba(ff66cccc)
    position = -155, -20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 35
    outline_thickness = 1
    inner_color = rgba(0, 0, 0, 0.0)

    outer_color = rgba(00fff7cc)
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgb(00fff7)
    fade_on_empty = false
    rounding = 4

    font_family = $font
    placeholder_text =  ▮
    fail_text = ✗  $PAMFAIL

    dots_text_format = ━
    dots_size = 0.35
    dots_spacing = 0.0

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgba(00fff7ee)

    position = -30, 0
    halign = right
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] LC_TIME=en_GB.UTF_8 date +"▸ %a | %d %b | %Y"
    font_size = 20
    font_family = $font
    color = rgba(ff66cccc)

    position = -30, -130
    halign = right
    valign = top
}

# BATTERY
label {
    monitor =
    text = cmd[update:30000] printf 'PWR:// %s%%' "$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 || echo 'N/A')"
    font_size = 16
    font_family = $font
    color = rgba(00fff7aa)

    position = -30, -160
    halign = right
    valign = top
}
