general {
  gaps_in = 5
  gaps_out = 20
  border_size = 2
  resize_on_border = false
  allow_tearing = false
  layout = dwindle
  col.active_border = rgba(c20bdecc) rgba(ff66ccdd) 45deg
  col.inactive_border = rgba(4b004d88)
}

decoration {
    rounding = 10
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(c20bde77)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.02
        vibrancy = 0.1696
    }
}
